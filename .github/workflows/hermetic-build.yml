name: hermetic-build

# Hermetic, verify-only build of the SQIsign library crates via stagex.
# Builds + tests the workspace offline in a digest-pinned toolchain
# (--locked, --network=none) -- a verification gate, not an artifact build.
# On release tags it also emits a CycloneDX SBOM and a SLSA provenance
# attestation and attaches the SBOM to the GitHub release. Nothing is shipped.
on:
  push:
    tags:
      - "v*.*.*"
    branches:
      - "main"
    paths:
      - ".github/workflows/hermetic-build.yml"
      - "crates/**"
      - "tools/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "images/**"
      - "scripts/**"
      - "Makefile"
  pull_request:
    # Run on every PR update *while* the `stagex` label is present, not just at
    # the moment the label is applied -- otherwise the check goes stale against
    # later commits. The `if` below gates on the label actually being present.
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch: # Allows manual invocation

jobs:
  build:
    name: Hermetic build
    # On pull_request, only run when the `stagex` label is present (the build is
    # expensive and not needed on every PR). Checking the label set (rather than
    # github.event.label) means synchronize/reopen events also run while labeled.
    if: >-
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'stagex')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      id-token: write       # provenance attestation (OIDC)
      attestations: write   # provenance attestation
      contents: write       # upload SBOM to the release
    steps:
      - name: Checkout sources
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Full history so auto-version.sh can compute commit heights and
          # merge-bases for non-tag builds.
          fetch-depth: 0
          # The reference submodule carries the KAT vectors the verify crate's
          # tests include_str! at compile time.
          submodules: recursive

      - name: Compute version
        id: version
        shell: bash
        env:
          GH_REF_TYPE: ${{ github.ref_type }}
          GH_REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ "$GH_REF_TYPE" == "tag" && "$GH_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            VERSION="${GH_REF_NAME#v}"
            IS_RELEASE_BUILD=1
          else
            VERSION=$(scripts/auto-version.sh)
            IS_RELEASE_BUILD=0
          fi
          # Strip "+branch-hash" build metadata and validate semver shape so a
          # malformed VERSION fails the build instead of silently producing
          # garbage downstream.
          SEMVER="${VERSION%%+*}"
          if [[ ! "$SEMVER" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: VERSION='$VERSION' produced non-semver SEMVER='$SEMVER'" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "semver=$SEMVER" >> "$GITHUB_OUTPUT"
          if [[ "$IS_RELEASE_BUILD" == "1" ]]; then
            echo "release_tag=v$SEMVER" >> "$GITHUB_OUTPUT"
          else
            echo "release_tag=" >> "$GITHUB_OUTPUT"
          fi
          echo "Version: $VERSION"

      - name: Build + test (hermetic, offline)
        id: build
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # `make verify` builds + tests the crates inside the pinned stagex
          # toolchain with --locked and --network=none; a non-zero exit fails
          # the job. This is the verification gate -- no artifact is produced.
          make VERSION="$VERSION" verify
          {
            echo "## Hermetic build"
            echo ""
            echo "- **Version**: \`${VERSION}\`"
            echo "- Built + tested \`sqisign-verify\` and \`sqisign-rs\` offline (\`--locked\`, \`--network=none\`)."
          } >> "$GITHUB_STEP_SUMMARY"

      # SBOM + provenance only on release tag builds.
      - name: Install Rust (for SBOM)
        if: steps.version.outputs.release_tag != ''
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable, pinned

      - name: Generate CycloneDX SBOM
        if: steps.version.outputs.release_tag != ''
        env:
          SEMVER: ${{ steps.version.outputs.semver }}
        run: |
          cargo install cargo-cyclonedx --version 0.5.9 --locked
          cargo cyclonedx --all --format json
          # cargo-cyclonedx writes <crate>/bom.json per package. Publish the main
          # crate's SBOM from its known path; fail loudly if it's missing rather
          # than guessing among the per-crate files.
          src="crates/sqisign-rs/bom.json"
          if [ ! -f "$src" ]; then
            echo "ERROR: expected SBOM not found at $src" >&2
            exit 1
          fi
          sbom="sqisign-rs-${SEMVER}.cdx.json"
          cp "$src" "$sbom"
          echo "sbom=$sbom" >> "$GITHUB_ENV"

      - name: Attest build provenance
        if: steps.version.outputs.release_tag != ''
        uses: actions/attest-build-provenance@ef244123eb79f2f7a7e75d99086184180e6d0018 # v1, pinned
        with:
          subject-path: ${{ env.sbom }}

      - name: Upload SBOM to release
        if: steps.version.outputs.release_tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.version.outputs.release_tag }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$sbom" --clobber
            echo "Uploaded $sbom to release $RELEASE_TAG."
          else
            echo "No release $RELEASE_TAG yet; skipping SBOM upload."
          fi
