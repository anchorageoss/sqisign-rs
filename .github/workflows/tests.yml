name: Tests

on: [push, pull_request]

jobs:
  tests:
    name: Unit & integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test -p sqisign-verify -p sqisign-rs --release
  zeroize-audit:
    name: ZeroizingAllocator audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --manifest-path crates/alloc/Cargo.toml --release
