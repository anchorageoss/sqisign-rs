name: Update Self-Signature
on:
  push:
    branches: [main]
    paths: ['crates/**/*.rs']

permissions:
  contents: write

jobs:
  sign:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build signing tool
        run: cargo build --release -p project-sign

      - name: Update README signature
        env:
          SQISIGN_SIGNING_KEY: ${{ secrets.SQISIGN_SIGNING_KEY }}
        run: cargo run --release -p project-sign -- update-readme --secret-key "$SQISIGN_SIGNING_KEY"

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md || \
            (git add README.md && \
             git commit -m "chore: update self-signature [skip ci]" && \
             git push)
