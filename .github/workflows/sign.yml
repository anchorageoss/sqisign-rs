name: Sign Release
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  sign:
    runs-on: ubuntu-latest
    env:
      PUBLIC_KEY: "1a5ec6377182ec36e4ab8d29ca525bbfb8dac4d547e9857774df20afd726690006ddca551230c4b1b416c53016ec4008becfda012d4afcfd198dae9f55e30b020c"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - name: Build signing tool
        run: cargo build --release -p project-sign

      - name: Compute source hash
        run: |
          HASH=$(cargo run --release -p project-sign -- hash)
          echo "SOURCE_HASH=$HASH" >> $GITHUB_ENV

      - name: Sign source hash
        env:
          SQISIGN_SIGNING_KEY: ${{ secrets.SQISIGN_SIGNING_KEY }}
        run: |
          SIG=$(cargo run --release -p project-sign -- sign \
            --secret-key "$SQISIGN_SIGNING_KEY" \
            --message "$SOURCE_HASH")
          echo "SIGNATURE=$SIG" >> $GITHUB_ENV

      - name: Verify signature
        run: |
          cargo run --release -p project-sign -- verify \
            --public-key "$PUBLIC_KEY" \
            --message "$SOURCE_HASH" \
            --signature "$SIGNATURE"

      - name: Write release artifacts
        run: |
          echo -n "$PUBLIC_KEY" > PROJECT_KEY
          cat > sqisign-attestation.txt <<EOF
          SQIsign Source Attestation
          Tag:        ${{ github.ref_name }}
          Commit:     ${{ github.sha }}
          Algorithm:  SQIsign Level 1 (compressed, 129 bytes)

          Public Key: $PUBLIC_KEY
          Source Hash: $SOURCE_HASH
          Signature:  $SIGNATURE

          Verify:
            cargo run --release -p project-sign -- verify \
              --public-key $PUBLIC_KEY \
              --message $SOURCE_HASH \
              --signature $SIGNATURE
          EOF

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            sqisign-attestation.txt \
            PROJECT_KEY \
            --clobber
